<!DOCTYPE html>
<html>
<head>
    <title>Quick Test</title>
</head>
<body>
    <h1>Testing API</h1>
    <div id="result"></div>
    
    <script>
        fetch('/api/users/countries')
            .then(response => response.json())
            .then(data => {
                document.getElementById('result').innerHTML = 
                    '<h2>Countries loaded: ' + data.data.length + '</h2>' +
                    '<ul>' + data.data.map(c => `<li>${c.countryName} (ID: ${c.countryId})</li>`).join('') + '</ul>';
            })
            .catch(error => {
                document.getElementById('result').innerHTML = '<p style="color: red;">Error: ' + error.message + '</p>';
            });
    </script>
</body>
</html>
