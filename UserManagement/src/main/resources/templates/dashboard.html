<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - User Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body class="bg-light">
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="#">User Management</a>
            <div class="navbar-nav ms-auto">
                <span class="navbar-text me-3">
                    Welcome, <span th:text="${userName}" class="fw-bold"></span>
                </span>
                <a class="nav-link" th:href="@{/logout}">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-header bg-info text-white">
                        <h4 class="mb-0">Dashboard</h4>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-8">
                                <h5>Random Quote of the Day</h5>
                                <div th:if="${quote}" class="quote-container">
                                    <blockquote class="blockquote">
                                        <p class="mb-2" th:text="${quote.quote}"></p>
                                        <footer class="blockquote-footer" th:text="${quote.author}"></footer>
                                    </blockquote>
                                </div>
                                <div th:unless="${quote}" class="alert alert-warning">
                                    Unable to load quote. Please try again later.
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="card bg-light">
                                    <div class="card-body">
                                        <h6 class="card-title">Quick Actions</h6>
                                        <div class="d-grid gap-2">
                                            <button class="btn btn-outline-primary btn-sm" onclick="refreshQuote()">
                                                <i class="fas fa-sync-alt"></i> Refresh Quote
                                            </button>
                                            <button class="btn btn-outline-info btn-sm" onclick="location.href='/reset-password'">
                                                <i class="fas fa-key"></i> Change Password
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- User Statistics -->
                        <div class="row mt-4">
                            <div class="col-md-12">
                                <h5>Your Profile Information</h5>
                                <div class="row">
                                    <div class="col-md-6">
                                        <div class="card border-primary">
                                            <div class="card-body">
                                                <h6 class="card-title">Account Details</h6>
                                                <p class="mb-1"><strong>Email:</strong> <span th:text="${session.userEmail}"></span></p>
                                                <p class="mb-0"><strong>Username:</strong> <span th:text="${userName}"></span></p>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <div class="card border-success">
                                            <div class="card-body">
                                                <h6 class="card-title">System Status</h6>
                                                <p class="mb-1"><strong>Status:</strong> <span class="badge bg-success">Active</span></p>
                                                <p class="mb-0"><strong>Last Login:</strong> <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm')}"></span></p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <script>
        function refreshQuote() {
            fetch('/api/users/dashboard/quote')
                .then(response => response.json())
                .then(data => {
                    if (data.status === 'SUCCESS' && data.data) {
                        const quoteContainer = document.querySelector('.quote-container blockquote');
                        quoteContainer.innerHTML = `
                            <p class="mb-2">${data.data.quote}</p>
                            <footer class="blockquote-footer">${data.data.author}</footer>
                        `;
                    } else {
                        alert('Failed to refresh quote');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('Error refreshing quote');
                });
        }
    </script>
</body>
</html>
